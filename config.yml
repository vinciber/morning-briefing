# Morning Briefing Configuration

schedule:
  morning: '0 5 * * 1-5'      # Lun-Ven ore 6:00 CET (5:00 UTC)

output:
  audio:
    language: 'it'
    voice_it: 'it-IT-DiegoNeural'
    voice_en: 'en-US-GuyNeural'
    speed: '+0%'
  site:
    base_url: 'https://vinciber.github.io/morning-briefing'
    languages: ['it', 'en']
    max_items_feed: 30

briefing:
  sections:
    - name: 'mercati'
      max_items: 5
    - name: 'geopolitica'
      max_items: 6
    - name: 'macro_economia'
      max_items: 4
    - name: 'energia'
      max_items: 3
  market_data:
    - EUR_USD
    - VIX
    - BTP_10Y
    - GOLD
    - OIL_BRENT
    - SP500_FUTURES
  depth: 'medium'

sources:
  # TIER 1 — Fonti Primarie Ufficiali
  tier1:
    - url: 'https://www.federalreserve.gov/feeds/press_all.xml'
      name: 'Federal Reserve'
      category: 'banche_centrali'
    - url: 'https://www.ecb.europa.eu/rss/press.html'
      name: 'BCE'
      category: 'banche_centrali'
    - url: 'https://www.bancaditalia.it/util/index.rss.html?sezione=/media/comunicati&lingua=en'
      name: 'Banca d Italia'
      category: 'banche_centrali'
    - url: 'https://www.bis.org/doclist/rss_all_categories.rss'
      name: 'BIS'
      category: 'banche_centrali'
    - url: 'https://www.ft.com/global-economy?format=rss'
      name: 'Financial Times (Global Economy)'
      category: 'macro_economia'
  # TIER 2 — Think Tank e Istituzioni
  tier2:
    - url: 'https://www.ispionline.it/en/feed'
      name: 'ISPI'
      category: 'geopolitica'
    - url: 'https://www.chathamhouse.org/path/whatsnew.xml'
      name: 'Chatham House'
      category: 'macro_economia'
    - url: 'https://www.crisisgroup.org/rss'
      name: 'International Crisis Group'
      category: 'geopolitica'
    - url: 'https://www.rand.org/topics/international-affairs.xml'
      name: 'RAND Corporation'
      category: 'geopolitica'
    - url: 'https://warontherocks.com/feed'
      name: 'War on the Rocks'
      category: 'geopolitica'
    - url: 'https://www.project-syndicate.org/rss'
      name: 'Project Syndicate'
      category: 'macro_economia'
    - url: 'https://oecdecoscope.blog/feed/'
      name: 'OECD (Ecoscope Macro)'
      category: 'macro_economia'
    - url: 'https://www.bruegel.org/rss.xml'
      name: 'Bruegel'
      category: 'macro_economia'
    - url: 'https://www.piie.com/rss/update.xml'
      name: 'PIIE'
      category: 'macro_economia'
    - url: 'https://carnegieendowment.org/rss/'
      name: 'Carnegie Endowment'
      category: 'geopolitica'
    - url: 'https://asia.nikkei.com/rss/feed/nar'
      name: 'Nikkei Asia'
      category: 'geopolitica'
    - url: 'https://www.eia.gov/rss/'
      name: 'US EIA (Energy)'
      category: 'energia'
    - url: 'https://rss.art19.com/the-insight'
      name: 'Oaktree Capital (Memos)'
      category: 'finanza'

  # TIER 3 — Analisi Finanziaria e Scraper
  tier3_webfetch:
    - url: 'https://www.blackrock.com/corporate/insights/blackrock-investment-institute'
      name: 'BlackRock Investment Institute'
      type: 'webfetch'
      category: 'finanza'
      frequency: 'weekly'
    - url: 'https://www.goldmansachs.com/insights'
      name: 'Goldman Sachs Insights'
      type: 'webfetch'
      category: 'finanza'
      frequency: 'weekly'
    - url: 'https://www.pimco.com/us/en/insights'
      name: 'PIMCO Insights'
      type: 'scraper'
      category: 'finanza'

  # TIER 4 — News Quotidiane Istituzionali
  tier4:
    - url: 'https://www.theguardian.com/business/economics/rss'
      name: 'Guardian Economics'
      category: 'macro_economia'
    - url: 'https://oilprice.com/rss/main'
      name: 'OilPrice'
      category: 'energia'
    - url: 'https://www.fsb.org/feed'
      name: 'Financial Stability Board'
      category: 'finanza'

  # FONTI CUSTOM (aggiungere qui le fonti personali)
  custom: []
