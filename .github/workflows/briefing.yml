# .github/workflows/briefing.yml
name: Morning Briefing

on:
  schedule:
    - cron: '0 5 * * 1-5'    # Lun-Ven ore 6:00 CET (5:00 UTC)
  workflow_dispatch:          # Esecuzione manuale da GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg (for pydub)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: STEP 1 — Fetch sources
        run: python src/fetcher.py

      - name: STEP 1b — Fetch Market Data
        run: python src/market_fetcher.py
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: STEP 2 — AI Summarize
        run: python src/summarizer.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: STEP 3a — Generate Audio (Piper TTS)
        run: |
          mkdir -p models
          # Download modelli da Hugging Face (Italiano + Inglese)
          if [ ! -f models/it_IT-paola-medium.onnx ]; then
            wget -q -O models/it_IT-paola-medium.onnx \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/it/it_IT/paola/medium/it_IT-paola-medium.onnx"
            wget -q -O models/it_IT-paola-medium.onnx.json \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/it/it_IT/paola/medium/it_IT-paola-medium.onnx.json"
          fi
          if [ ! -f models/en_US-ryan-medium.onnx ]; then
            wget -q -O models/en_US-ryan-medium.onnx \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/ryan/medium/en_US-ryan-medium.onnx"
            wget -q -O models/en_US-ryan-medium.onnx.json \
              "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/ryan/medium/en_US-ryan-medium.onnx.json"
          fi
          python src/tts.py
          # Verifica che l'audio sia stato generato
          ls docs/audio/*.mp3 && echo "✅ Audio generato" || echo "⚠️ Nessun file audio"
        continue-on-error: true

#      - name: STEP 3b — Send Email
#        run: python src/email_sender.py
#        continue-on-error: true
#        env:
#          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
#          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - name: STEP 3c — Telegram
        run: python src/telegram_bot.py
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: STEP 3d — Update GitHub Pages
        run: python src/site_generator.py

      - name: STEP 3e — Archive Data
        run: python src/archiver.py

      - name: STEP 4 — Commit & Push changes (Local)
        run: |
          git config --global user.name 'MorningBriefingBot'
          git config --global user.email 'bot@briefing.local'
          git add docs/ data/
          git commit -m "briefing: $(date +%Y-%m-%d)" || exit 0
          git fetch origin main
          git rebase origin/main -X theirs || (git rebase --abort && git pull --rebase origin main -X theirs)
          git push origin main

      - name: STEP 4b — Push to Main Site Repository
        env:
          MAIN_REPO_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
        run: |
          if [ -z "$MAIN_REPO_TOKEN" ]; then
            echo "❌ MAIN_REPO_TOKEN non configurato — push saltato"
            exit 1
          fi

          echo "📦 Clono price-alert-tg-backend..."
          git clone https://vinciber:$MAIN_REPO_TOKEN@github.com/vinciber/price-alert-tg-backend.git main-repo

          echo "🗑️ Pulizia cartella morning-update..."
          rm -rf main-repo/public/morning-update
          mkdir -p main-repo/public/morning-update

          echo "📋 Copia docs/ → public/morning-update/..."
          cp -r docs/. main-repo/public/morning-update/

          echo "🔍 Verifica file chiave:"
          ls -la main-repo/public/morning-update/api/today.json || echo "❌ today.json mancante!"

          cd main-repo
          git config user.name 'MorningBriefingBot'
          git config user.email 'bot@briefing.local'
          git add -A public/morning-update

          if git diff --staged --quiet; then
            echo "✅ Nessuna modifica da committare"
          else
            git commit -m "briefing update: $(date +%Y-%m-%d)"
            git push origin main && echo "✅ Push completato" || echo "❌ Push fallito"
          fi

      - name: STEP 5 — Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: briefing
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
